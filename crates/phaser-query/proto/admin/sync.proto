syntax = "proto3";

package phaser.admin;

// Admin service for managing historical data synchronization
service SyncService {
  // Start a historical sync job
  rpc StartSync(SyncRequest) returns (SyncResponse);

  // Get status of a sync job
  rpc GetSyncStatus(SyncStatusRequest) returns (SyncStatusResponse);

  // List all sync jobs
  rpc ListSyncJobs(ListSyncJobsRequest) returns (ListSyncJobsResponse);

  // Cancel a running sync job
  rpc CancelSync(CancelSyncRequest) returns (CancelSyncResponse);

  // Stream real-time progress updates for a sync job
  rpc StreamSyncProgress(SyncProgressRequest) returns (stream SyncProgressUpdate);

  // Analyze gaps in existing data without starting a sync job
  rpc AnalyzeGaps(AnalyzeGapsRequest) returns (AnalyzeGapsResponse);
}

message SyncRequest {
  // Chain ID to sync (must match a configured bridge)
  uint64 chain_id = 1;

  // Bridge name to use (must be configured in bridges)
  string bridge_name = 2;

  // Starting block number (inclusive)
  uint64 from_block = 3;

  // Ending block number (inclusive)
  uint64 to_block = 4;
}

message SyncResponse {
  // Unique ID for this sync job
  string job_id = 1;

  // Status message
  string message = 2;

  // Whether the request was accepted
  bool accepted = 3;

  // Gap analysis - existing data overview
  GapAnalysis gap_analysis = 4;
}

message GapAnalysis {
  // Total segments in the requested range
  uint64 total_segments = 1;

  // Number of complete segments (all data types present)
  uint64 complete_segments = 2;

  // Number of missing or incomplete segments
  uint64 missing_segments = 3;

  // Completion percentage (0-100)
  double completion_percentage = 4;

  // Number of stale temp files cleaned
  uint64 cleaned_temp_files = 5;

  // Segments that need syncing
  repeated uint64 segments_to_sync = 6;

  // Incomplete segments with details
  repeated IncompleteSegment incomplete_details = 7;
}

// A contiguous range of positions (blocks, slots, offsets, etc.)
// Generic - works for any ordered data source
message Range {
  // Start position (inclusive)
  uint64 start = 1;

  // End position (inclusive)
  uint64 end = 2;
}

// Missing ranges for a specific data type
message DataTypeRanges {
  // Data type name (e.g., "blocks", "transactions", "logs", "events")
  string data_type = 1;

  // Missing ranges for this data type
  repeated Range ranges = 2;
}

message IncompleteSegment {
  // Segment number
  uint64 segment_num = 1;

  // Position range for this segment
  uint64 from_position = 2;
  uint64 to_position = 3;

  // Missing data types (e.g., "blocks", "txs", "logs")
  repeated string missing_data_types = 4;

  // Generic missing ranges by data type (replaces separate fields)
  repeated DataTypeRanges missing_ranges = 8;

  // DEPRECATED: Use missing_ranges instead
  // Kept for backwards compatibility during transition
  repeated Range missing_blocks_ranges = 5 [deprecated = true];
  repeated Range missing_transactions_ranges = 6 [deprecated = true];
  repeated Range missing_logs_ranges = 7 [deprecated = true];
}

message SyncStatusRequest {
  // Job ID to query
  string job_id = 1;
}

message SyncStatusResponse {
  // Job ID
  string job_id = 1;

  // Current status
  SyncStatus status = 2;

  // Current block being synced
  uint64 current_block = 3;

  // Total blocks to sync
  uint64 total_blocks = 4;

  // Number of blocks synced so far (based on complete segments)
  uint64 blocks_synced = 5;

  // Error message if failed
  string error = 6;

  // Number of active workers
  uint32 active_workers = 7;

  // Chain ID
  uint64 chain_id = 8;

  // Bridge name
  string bridge_name = 9;

  // Block range
  uint64 from_block = 10;
  uint64 to_block = 11;

  // Gap analysis from when job started
  GapAnalysis gap_analysis = 12;

  // Detailed progress metrics
  DataProgress data_progress = 13;
}

message ListSyncJobsRequest {
  // Optional: filter by status
  optional SyncStatus status_filter = 1;
}

message ListSyncJobsResponse {
  // List of sync jobs
  repeated SyncStatusResponse jobs = 1;
}

message CancelSyncRequest {
  // Job ID to cancel
  string job_id = 1;
}

message CancelSyncResponse {
  // Whether cancellation was successful
  bool success = 1;

  // Status message
  string message = 2;
}

message SyncProgressRequest {
  // Job ID to stream progress for
  string job_id = 1;
}

message SyncProgressUpdate {
  // Job ID
  string job_id = 1;

  // Overall job status
  SyncStatus status = 2;

  // Timestamp of this update (Unix timestamp in seconds)
  int64 timestamp = 3;

  // Per-worker progress
  repeated WorkerProgress workers = 4;

  // Overall statistics
  uint64 total_blocks_synced = 5;
  uint64 total_blocks = 6;
  double overall_rate = 7; // blocks per second
  uint64 total_bytes_written = 8;

  // Detailed progress metrics
  DataProgress data_progress = 9;
}

message WorkerProgress {
  // Worker ID
  uint32 worker_id = 1;

  // Block range for this worker
  uint64 from_block = 2;
  uint64 to_block = 3;

  // When this worker started (Unix timestamp in seconds)
  int64 started_at = 4;

  // Worker status: "running", "completed", "failed"
  string status = 5;
}

message AnalyzeGapsRequest {
  // Chain ID to analyze
  uint64 chain_id = 1;

  // Bridge name
  string bridge_name = 2;

  // Starting block number (inclusive)
  uint64 from_block = 3;

  // Ending block number (inclusive)
  uint64 to_block = 4;
}

message AnalyzeGapsResponse {
  // Gap analysis for the requested range
  GapAnalysis gap_analysis = 1;

  // Message summarizing the analysis
  string message = 2;
}

// Detailed progress tracking for each data type
message DataProgress {
  // Generic progress by data type name (replaces separate fields)
  map<string, DataTypeProgress> by_type = 5;

  // File statistics
  FileStatistics file_stats = 4;

  // DEPRECATED: Use by_type["blocks"] instead
  DataTypeProgress blocks = 1 [deprecated = true];
  DataTypeProgress transactions = 2 [deprecated = true];
  DataTypeProgress logs = 3 [deprecated = true];
}

// Progress for a specific data type
message DataTypeProgress {
  // Number of positions covered by files on disk (may have gaps)
  uint64 positions_on_disk = 1;

  // Number of gaps (missing ranges)
  uint32 gap_count = 2;

  // Percentage of target range covered (0-100)
  double coverage_percentage = 3;

  // Highest continuous position (no gaps before this)
  uint64 highest_continuous = 4;
}

// File statistics for a specific data type
message DataTypeFileStats {
  uint32 file_count = 1;
  uint64 disk_bytes = 2;
}

// File and disk statistics
message FileStatistics {
  // Total number of parquet files
  uint32 total_files = 1;

  // Total disk usage in bytes
  uint64 total_disk_bytes = 6;

  // Generic file stats by data type name
  map<string, DataTypeFileStats> by_type = 11;

  // DEPRECATED: Use by_type instead
  uint32 blocks_files = 2 [deprecated = true];
  uint32 transactions_files = 3 [deprecated = true];
  uint32 logs_files = 4 [deprecated = true];
  uint32 proofs_files = 5 [deprecated = true];
  uint64 blocks_disk_bytes = 7 [deprecated = true];
  uint64 transactions_disk_bytes = 8 [deprecated = true];
  uint64 logs_disk_bytes = 9 [deprecated = true];
  uint64 proofs_disk_bytes = 10 [deprecated = true];
}

enum SyncStatus {
  SYNC_STATUS_UNKNOWN = 0;
  SYNC_STATUS_PENDING = 1;
  SYNC_STATUS_RUNNING = 2;
  SYNC_STATUS_COMPLETED = 3;
  SYNC_STATUS_FAILED = 4;
  SYNC_STATUS_CANCELLED = 5;
}
