syntax = "proto3";

package custom;

option go_package = "github.com/erigontech/erigon-lib/gointerfaces/custom";

// NOTE: This is a custom extension to Erigon's gRPC interface.
// Standard Erigon nodes will NOT have this service.
// Clients MUST handle "Unimplemented" errors gracefully when these methods don't exist.
//
// To use this service, Erigon must be running a custom build that includes
// the BlockDataBackend server implementation.

// BlockDataBackend service provides blockchain data as RLP-encoded bytes
// This service streams data from both snapshots (frozen blocks) and live database
service BlockDataBackend {
  // Stream block headers as RLP-encoded data (fast: from snapshots/DB)
  rpc StreamBlocks(BlockRangeRequest) returns (stream BlockBatch);

  // Stream transactions as RLP-encoded data, no receipts (fast: from blocks)
  rpc StreamTransactions(BlockRangeRequest) returns (stream TransactionBatch);

  // Execute blocks in range and stream RLP receipts (slow: executes blocks, generates receipts)
  // For single block execution, set from_block == to_block
  rpc ExecuteBlocks(BlockRangeRequest) returns (stream ReceiptBatch);
}

// Request to stream data for a block range
message BlockRangeRequest {
  uint64 from_block = 1;  // Starting block number (inclusive)
  uint64 to_block = 2;    // Ending block number (inclusive, 0 = latest)
  uint32 batch_size = 3;  // Records per batch (default: 1000)
  bool enable_traces = 4; // Enable callTracer traces during ExecuteBlocks (default: false, 2-5x slower)
}

// A batch of RLP-encoded block headers
message BlockBatch {
  repeated BlockData blocks = 1;

  // Batch metadata
  uint64 first_block = 2;  // First block number in this batch
  uint64 last_block = 3;   // Last block number in this batch
  bool is_last = 4;        // True if this is the last batch
}

// RLP-encoded block header data
message BlockData {
  uint64 block_number = 1;
  bytes rlp_header = 2;     // RLP-encoded block header
  bytes block_hash = 3;     // 32-byte block hash
}

// A batch of RLP-encoded transactions
message TransactionBatch {
  repeated TransactionData transactions = 1;

  // Batch metadata
  uint64 first_block = 2;  // First block number in this batch
  uint64 last_block = 3;   // Last block number in this batch
  bool is_last = 4;        // True if this is the last batch
}

// RLP-encoded transaction data (no receipts - use ExecuteBlocks for receipts)
message TransactionData {
  uint64 block_number = 1;
  bytes block_hash = 2;     // 32-byte block hash
  uint32 tx_index = 3;      // Transaction index in block
  bytes rlp_transaction = 4; // RLP-encoded transaction
  bytes tx_hash = 5;        // 32-byte transaction hash
  bytes sender = 6;         // 20-byte sender address (from TxSender table)
}

// A batch of RLP-encoded receipts
message ReceiptBatch {
  repeated ReceiptData receipts = 1;

  // Batch metadata
  uint64 first_block = 2;  // First block number in this batch
  uint64 last_block = 3;   // Last block number in this batch
  bool is_last = 4;        // True if this is the last batch
}

// RLP-encoded receipt data with optional trace data
message ReceiptData {
  uint64 block_number = 1;
  bytes block_hash = 2;     // 32-byte block hash
  uint32 tx_index = 3;      // Transaction index in block
  bytes rlp_receipt = 4;    // RLP-encoded receipt (contains all logs for this tx)
  bytes tx_hash = 5;        // 32-byte transaction hash
  bytes trace_data = 6;     // JSON-encoded trace (callTracer format), empty if tracing disabled
}